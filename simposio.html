<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Simposio Digitale</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #fdf6e3; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .chat-container { 
            background: white; 
            border: 4px solid #d4a373; 
            border-radius: 20px; 
            width: 95%; 
            max-width: 600px; 
            padding: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        #chat-content { 
            height: 350px; 
            overflow-y: auto; 
            margin-bottom: 15px; 
            border-bottom: 2px solid #eee; 
            padding: 10px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg { padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.5; }
        .filosofo { background: #faedcd; align-self: flex-start; border-left: 5px solid #d4a373; }
        .alunno { background: #e9edc9; align-self: flex-end; text-align: right; }

        .controlli { display: flex; gap: 8px; flex-wrap: wrap; }
        select, input { padding: 12px; border-radius: 10px; border: 1px solid #ccc; outline: none; }
        input { flex-grow: 1; }
        
        button { 
            padding: 12px 20px; 
            background: #d4a373; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
        }

        .btn-home { background: #8b4513; margin-bottom: 15px; }
    </style>
</head>
<body>

    <a href="index.html" style="text-decoration: none;">
        <button class="btn-home">⬅ Torna alla Home</button>
    </a>

    <div class="chat-container">
        <label>Scegli il tuo maestro:</label>
        <select id="select-filosofo">
            <option value="Talete">Talete (Tutto è acqua)</option>
            <option value="Eraclito">Eraclito (Tutto scorre)</option>
            <option value="Lucrezio">Lucrezio (Gli atomi)</option>
            <option value="Anassimandro">Anassimandro (L'infinito)</option>
        </select>

        <div id="chat-content">
            <div class="msg filosofo"><strong>Saggio:</strong> Salve, giovane cercatore di verità! Scegli un filosofo e scrivimi qualcosa... io sono pronto a risponderti!</div>
        </div>

        <div class="controlli">
            <input type="text" id="user-msg" placeholder="Chiedi qualcosa...">
            <button onclick="chiediAlFilosofo()">Parla!</button>
        </div>
    </div>

    <script>
        let apiKey = "";

        // Chiediamo la chiave all'apertura della pagina
        window.onload = () => {
            apiKey = prompt("Per favore, inserisci la tua API Key per attivare i filosofi:");
        };

        async function chiediAlFilosofo() {
            const filosofo = document.getElementById('select-filosofo').value;
            const input = document.getElementById('user-msg');
            const messaggio = input.value;
            const chatContent = document.getElementById('chat-content');

            if (!messaggio || !apiKey) return;

            // Messaggio Alunno
            chatContent.innerHTML += `<div class="msg alunno"><strong>Tu:</strong> ${messaggio}</div>`;
            input.value = "";

            // Prompt per l'IA
            const istruzioni = `Tu sei il filosofo greco ${filosofo}. 
            Rispondi a un bambino di quarta elementare (9 anni). 
            Usa termini semplici, sii molto gentile e poetico. 
            Spiega brevemente la tua teoria principale applicandola a esempi del mondo d'oggi. 
            Non rispondere mai in modo complicato. Massimo 3 frasi.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        contents: [{ parts: [{ text: istruzioni + "\n\nMessaggio del bambino: " + messaggio }] }]
    })
});

                const data = await response.json();
                const rispostaIA = data.candidates[0].content.parts[0].text;

                chatContent.innerHTML += `<div class="msg filosofo"><strong>${filosofo}:</strong> ${rispostaIA}</div>`;
                chatContent.scrollTop = chatContent.scrollHeight;

            } catch (error) {
                chatContent.innerHTML += `<div class="msg filosofo"><em>Il saggio è assorto nei suoi pensieri. (Controlla la tua API Key!)</em></div>`;
            }
        }
    </script>
</body>
</html>
