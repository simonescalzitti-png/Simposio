<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Simposio Digitale</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #fdf6e3; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .chat-container { background: white; border: 4px solid #d4a373; border-radius: 20px; width: 95%; max-width: 600px; padding: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        #chat-content { height: 350px; overflow-y: auto; margin-bottom: 15px; border-bottom: 2px solid #eee; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.5; }
        .filosofo { background: #faedcd; align-self: flex-start; border-left: 5px solid #d4a373; font-size: 0.95em; }
        .alunno { background: #e9edc9; align-self: flex-end; text-align: right; font-size: 0.95em; }
        .controlli { display: flex; gap: 8px; flex-wrap: wrap; }
        select, input { padding: 12px; border-radius: 10px; border: 1px solid #ccc; outline: none; }
        input { flex-grow: 1; font-size: 16px; } /* 16px evita lo zoom automatico su iPhone */
        button { padding: 12px 20px; background: #d4a373; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:hover { background: #bc8a5f; }
        .btn-home { background: #8b4513; margin-bottom: 15px; color: white; padding: 10px; border-radius: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <button class="btn-home" onclick="window.location.href='index.html'">⬅ Torna alla Home</button>

    <div class="chat-container">
        <label for="select-filosofo">Scegli il tuo maestro:</label>
        <select id="select-filosofo">
            <option value="Talete">Talete (L'acqua è l'origine)</option>
            <option value="Eraclito">Eraclito (Tutto scorre)</option>
            <option value="Lucrezio">Lucrezio (La natura e gli atomi)</option>
            <option value="Anassimandro">Anassimandro (L'infinito)</option>
        </select>

        <div id="chat-content">
            <div class="msg filosofo"><strong>Saggio:</strong> Salve, piccolo ricercatore! Inserisci la tua chiave API e poni una domanda sulla natura o sull'universo.</div>
        </div>

        <div class="controlli">
            <input type="text" id="user-msg" placeholder="Chiedi qualcosa ai filosofi...">
            <button id="btn-parla">Parla!</button>
        </div>
    </div>

    <script>
        // Variabile globale per la chiave
        var apiKey = "";

        // Chiede la chiave appena la pagina è caricata
        window.onload = function() {
            apiKey = prompt("Per favore, incolla qui la tua API Key di Google:");
            if (!apiKey) {
                alert("Senza chiave i filosofi non possono risponderti. Ricarica la pagina per inserirla.");
            }
            // Collega il tasto alla funzione
            document.getElementById('btn-parla').onclick = chiediAlFilosofo;
        };

        // Gestione invio con tasto Enter
        document.getElementById('user-msg').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                chiediAlFilosofo();
            }
        });

        async function chiediAlFilosofo() {
            var filosofoSelezionato = document.getElementById('select-filosofo').value;
            var inputCampo = document.getElementById('user-msg');
            var messaggioUtente = inputCampo.value.trim();
            var chat = document.getElementById('chat-content');

            if (!messaggioUtente) return;
            if (!apiKey) {
                alert("Devi inserire la chiave API! Ricarica la pagina.");
                return;
            }

            // 1. Mostra il messaggio dell'utente nella chat
            chat.innerHTML += '<div class="msg alunno"><strong>Tu:</strong> ' + messaggioUtente + '</div>';
            inputCampo.value = ""; // Pulisce il campo
            chat.scrollTop = chat.scrollHeight;

            // 2. Prepara le istruzioni per l'IA
            var istruzioni = "Ti chiami " + filosofoSelezionato + ". Sei un filosofo dell'antica Grecia. Rispondi a un bambino di 9 anni usando parole semplici, metafore naturali e un tono gentile. Non scrivere più di 2 frasi.";

            // 3. Indirizzo API (Modello Flash 1.5 - il più stabile)
            var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey;

            try {
                var response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: istruzioni + "\n\nDomanda del bambino: " + messaggioUtente }]
                        }]
                    })
                });

                var data = await response.json();

                // Gestione errori specifica
                if (data.error) {
                    throw new Error(data.error.message);
                }

                // 4. Estrai la risposta e mostrala
                if (data.candidates && data.candidates[0].content) {
                    var testoRisposta = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += '<div class="msg filosofo"><strong>' + filosofoSelezionato + ':</strong> ' + testoRisposta + '</div>';
                } else {
                    throw new Error("L'oracolo è rimasto in silenzio. Riprova.");
                }

                chat.scrollTop = chat.scrollHeight;

            } catch (errore) {
                console.error("Errore tecnico:", errore);
                chat.innerHTML += '<div class="msg filosofo" style="color: red;"><em>Il saggio è assorto: ' + errore.message + '</em></div>';
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
